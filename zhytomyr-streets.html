<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вулиці Житомира</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: linear-gradient(135deg, #1e3a8a, #312e81);
      color: white;
      margin: 0;
      padding: 20px;
      transition: background 0.6s;
    }
    h1 { margin: 20px 0 15px; }
    button {
      padding: 18px 35px;
      font-size: 19px;
      margin: 12px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
    }
    .timer-btn { background: #f59e0b; color: black; }
    .unlimited-btn { background: #22c55e; color: black; }
    .music-btn, .ach-btn, .shop-btn {
      background: #8b5cf6; color: white; padding: 12px 20px; font-size: 17px; margin: 8px;
    }
    #coins { font-size: 24px; margin: 10px 0; font-weight: bold; }
    input { padding: 16px; font-size: 22px; width: 70%; max-width: 500px; border: none; border-radius: 12px; margin: 15px 0; }
    #timer { font-size: 48px; font-weight: bold; color: #f87171; margin: 15px 0; }
    .table-container {
      max-width: 900px; margin: 25px auto; max-height: 500px; overflow-y: auto;
      border: 2px solid rgba(255,255,255,0.2); border-radius: 12px;
    }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); text-align: left; }
    th { background: rgba(255,255,255,0.1); position: sticky; top: 0; }
    .found { color: #22c55e; font-weight: bold; background: rgba(34, 197, 94, 0.2); }
  </style>
</head>

  <h1>Назви якнайбільше вулиць Житомира</h1>

    <button class="timer-btn" onclick="startGame(30)">30 хвилин</button>

  </div>

    let coins = 0;

    const input = document.getElementById('input');
    const scoreEl = document.querySelector('#score strong');
    const totalEl = document.getElementById('total');

      default: "linear-gradient(135deg, #1e3a8a, #312e81)",

      green: "linear-gradient(135deg, #166534, #14532d)",
      night: "linear-gradient(135deg, #1f2937, #111827)"
    };

    function loadProgress() {
      const savedCoins = localStorage.getItem('zhytomyrCoins');
      const savedBg = localStorage.getItem('zhytomyrBackground');
      if (savedCoins) coins = parseInt(savedCoins);
      if (savedBg && backgrounds[savedBg]) currentBackground = savedBg;
      coinsEl.textContent = coins;
      document.body.style.background = backgrounds[currentBackground];
    }

    function saveProgress() {
      localStorage.setItem('zhytomyrCoins', coins);
      localStorage.setItem('zhytomyrBackground', currentBackground);
    }

    function addCoins(amount) {
      coins += amount;
      coinsEl.textContent = coins;
      saveProgress();
    }

    function closeShop() {
      const modal = document.getElementById('shop-modal');
      if (modal) modal.remove();
    }

    window.buyBackground = function(bg) {
      const prices = { blue: 150, green: 200, night: 250 };
      if (bg === 'default') {
        currentBackground = 'default';
        document.body.style.background = backgrounds.default;
      } else if (coins >= prices[bg]) {
        coins -= prices[bg];
        currentBackground = bg;
        document.body.style.background = backgrounds[bg];
        coinsEl.innerHTML = `Крошники: <img src="kroshnik.jpg" width="28" height="28" style="vertical-align:middle;"> <strong>${coins}</strong>`;
        alert("✅ Фон змінено!");
      } else {
        alert("Недостатньо Крошників!");
        return;
      }
      saveProgress();
    };

    function startGame(minutes) {
      document.getElementById('mode-selection').style.display = 'none';
      gameDiv.style.display = 'block';
      input.focus();
      if (minutes === 0) isUnlimited = true;
      else timeLeft = minutes * 60;
      startTime = Date.now();
      currentCombo = 0;
      mistakes = 0;
      initAchievements();
      loadProgress();
      startTimer();
      input.addEventListener('input', checkStreet);
      playMusic();
    }

      function toggleMusic() {
      if (isMusicPlaying) {
        bgMusic.pause();
        musicBtn.textContent = "Музика: Вимкнено";
        musicBtn.style.background = "#ef4444";
      } else {
        bgMusic.play();
        musicBtn.textContent = "Музика: Увімкнено";
        musicBtn.style.background = "#8b5cf6";
      }
      isMusicPlaying = !isMusicPlaying;
    }

    function playMusic() {
      bgMusic.volume = 0.25;
      bgMusic.play().catch(() => {});
    }

    function updateTable() {
      tbody.innerHTML = '';
      totalEl.textContent = allStreets.length;
      guessed.forEach(street => {
        const tr = document.createElement('tr');
        tr.classList.add('found');
        tr.innerHTML = `<td>${street}</td>`;
        tbody.appendChild(tr);
      });
      scoreEl.textContent = guessed.size;
    }

    function checkStreet() {
      let value = input.value.trim().toLowerCase();
      if (!value) return;
      value = value.replace(/вулиця|вул\.?|пров\.?|шосе|проспект|майдан|узвіз/gi, '').trim();
      const found = allStreets.find(street => street.toLowerCase() === value);
      if (found && !guessed.has(found)) {
        guessed.add(found);
        currentCombo++;
        addCoins(10);
        updateTable();
        checkAchievements();
        input.value = '';
      } else {
        currentCombo = 0;
        mistakes++;
      }
    }

    function startTimer() {
      if (isUnlimited) {
        timerEl.textContent = "Безліміт";
        return;
      }
      timerInterval = setInterval(() => {
        timeLeft--;
        const hours = Math.floor(timeLeft / 3600);
        const minutes = Math.floor((timeLeft % 3600) / 60);
        const seconds = timeLeft % 60;
        timerEl.textContent = `${hours}:${minutes < 10 ? '0' : ''}${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          alert(`Час вийшов!\nТи назвав ${guessed.size} вулиць!`);
        }
      }, 1000);
    }

    function loadAchievements() {
      const saved = localStorage.getItem('zhytomyrAchievements');
      if (saved) unlockedAchievements = new Set(JSON.parse(saved));
    }

    function saveAchievements() {
      localStorage.setItem('zhytomyrAchievements', JSON.stringify([...unlockedAchievements]));
    }

    function showAchievementPopup(ach) {
      const popup = document.createElement('div');
      popup.style.cssText = `position:fixed;top:20px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#22c55e,#15803d);color:white;padding:20px 30px;border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,0.4);z-index:10000;display:flex;align-items:center;gap:15px;font-size:18px;`;
      popup.innerHTML = `<span style="font-size:40px;">${ach.icon}</span><div><strong>Нове досягнення!</strong><br><b>${ach.name}</b><br><small>${ach.desc}</small></div>`;
      document.body.appendChild(popup);
      setTimeout(() => popup.remove(), 4500);
    }

    function checkAchievements() {
      const count = guessed.size;
      achievements.forEach(ach => {
        if (unlockedAchievements.has(ach.id)) return;
        let unlocked = false;
        if (ach.type === "count" && count >= ach.target) unlocked = true;
        if (unlocked) {
          unlockedAchievements.add(ach.id);
          showAchievementPopup(ach);
          saveAchievements();
        }
      });
    }
