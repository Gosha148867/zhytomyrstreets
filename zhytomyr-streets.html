      "2 Хмельовий", "Холодильний", "Цегляна", "Цегляний", "Цілинний", "Ціолковського",
      "Цюрупи", "Червоний", "Червоного Хреста", "Черняхівський", "Чеська", "Чеська Крошня",
	  "Миколи Чечеля", "Чистий", "Чорновола", "Павла Чубинського", "Чуднівська",
      "Чуднівське", "2 Чуднівський", "3 Чуднівський", "4 Чуднівський", "Чумацький Шлях",
      "1 Шевченківський", "2 Шевченківський", "3 Шевченківський", "Віктора Шкуринського",
      "Митрополита Андрея Шептицького", "Романа Шухевича", "Швейний", "Шевченка",
      "Шкільний", "Шлях до греблі", "Шляхетна", "Шодуарівський", "Шолом-Алейхема",
      "Шосейний", "Шпаковська", "Шумський", "Яблунева", "Якубця", "Ялинкова",
      "Яроцького", "Ясеневий", "Ясний"
    ].sort();

    let guessed = new Set();
    let timeLeft = 7200; // 2 години

    const input = document.getElementById('input');
    const scoreEl = document.querySelector('#score strong');
    const totalEl = document.getElementById('total');
    const tbody = document.querySelector('#street-table tbody');

    function updateTable() {
      tbody.innerHTML = '';
      totalEl.textContent = allStreets.length;
      guessed.forEach(street => {
        const tr = document.createElement('tr');
        tr.classList.add('found');
        tr.innerHTML = `<td>${street}</td>`;
        tbody.appendChild(tr);
      });
      scoreEl.textContent = guessed.size;
    }

    function startTimer() {
      const timerEl = document.getElementById('timer');
      const interval = setInterval(() => {
        timeLeft--;
        const hours = Math.floor(timeLeft / 3600);
        const minutes = Math.floor((timeLeft % 3600) / 60);
        const seconds = timeLeft % 60;
        timerEl.textContent = `${hours}:${minutes < 10 ? '0' : ''}${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;

        if (timeLeft <= 0) {
          clearInterval(interval);
          alert(`Час вийшов!\nТи назвав ${guessed.size} вулиць!`);
        }
      }, 1000);
    }

    function checkStreet() {
      let value = input.value.trim().toLowerCase();
      if (!value) return;

      const found = allStreets.find(street => street.toLowerCase() === value);

      if (found && !guessed.has(found)) {
        guessed.add(found);
        updateTable();
        input.value = '';
      } else {
        input.style.border = "2px solid #ef4444";
        setTimeout(() => input.style.border = "", 700);
      }
    }

    window.onload = () => {
      startTimer();
      input.focus();
      input.addEventListener('keypress', e => {
        if (e.key === 'Enter') checkStreet();
      });
    };
  </script>
</body>
</html>
